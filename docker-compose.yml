version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: customer_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: customer_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mock-server:
    build:
      context: ./mock-server
      dockerfile: Dockerfile
    container_name: flask_mock_server
    ports:
      - "5000:5000"
    volumes:
      - ./mock-server:/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  pipeline-service:
    build:
      context: ./pipeline-service
      dockerfile: Dockerfile
    container_name: fastapi_pipeline
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/customer_db
    volumes:
      - ./pipeline-service:/app
    depends_on:
      postgres:
        condition: service_healthy
      mock-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
